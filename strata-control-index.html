<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Strata Control</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #0a0a0f; color: #e0e0e0; font-family: -apple-system, 'SF Pro Text', system-ui, sans-serif; padding: 24px; }
  h1 { font-size: 20px; font-weight: 600; color: #f5f5f5; margin-bottom: 4px; }
  .subtitle { font-size: 13px; color: #666; margin-bottom: 32px; }
  .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(340px, 1fr)); gap: 16px; margin-bottom: 24px; }
  .card { background: #12121a; border: 1px solid #1e1e2e; border-radius: 12px; padding: 20px; }
  .card-title { font-size: 11px; text-transform: uppercase; letter-spacing: 1.2px; color: #555; margin-bottom: 14px; }
  .machine { display: flex; justify-content: space-between; align-items: flex-start; }
  .machine-name { font-size: 16px; font-weight: 600; color: #f5f5f5; }
  .machine-host { font-size: 12px; color: #666; }
  .stat-row { display: flex; gap: 24px; margin-top: 12px; flex-wrap: wrap; }
  .stat { display: flex; flex-direction: column; }
  .stat-label { font-size: 10px; text-transform: uppercase; letter-spacing: 0.8px; color: #555; }
  .stat-value { font-size: 15px; font-weight: 500; color: #ccc; margin-top: 2px; }
  .badge { display: inline-block; padding: 3px 10px; border-radius: 100px; font-size: 11px; font-weight: 600; }
  .badge-green { background: #0a2a1a; color: #34d399; }
  .badge-red { background: #2a0a0a; color: #f87171; }
  .badge-yellow { background: #2a2a0a; color: #fbbf24; }
  .service-row { display: flex; justify-content: space-between; align-items: center; padding: 8px 0; border-bottom: 1px solid #1a1a24; }
  .service-row:last-child { border-bottom: none; }
  .service-name { font-size: 13px; font-weight: 500; }
  .service-machine { font-size: 11px; color: #555; }
  .vpn-info { display: flex; gap: 20px; flex-wrap: wrap; }
  .vpn-item { display: flex; flex-direction: column; gap: 2px; }
  .vpn-label { font-size: 10px; text-transform: uppercase; letter-spacing: 0.8px; color: #555; }
  .vpn-value { font-size: 14px; color: #ccc; }
  .sync-row { display: flex; justify-content: space-between; align-items: center; padding: 10px 0; border-bottom: 1px solid #1a1a24; }
  .sync-row:last-child { border-bottom: none; }
  .sync-bar { width: 100px; height: 4px; background: #1e1e2e; border-radius: 2px; overflow: hidden; }
  .sync-fill { height: 100%; background: #34d399; border-radius: 2px; transition: width 0.3s; }
  .timestamp { text-align: center; font-size: 11px; color: #444; margin-top: 16px; }
  .loading { text-align: center; padding: 60px; color: #444; }
  .refresh-btn { position: fixed; bottom: 24px; right: 24px; background: #1e1e2e; border: 1px solid #2e2e3e; color: #888; padding: 10px 16px; border-radius: 8px; cursor: pointer; font-size: 12px; }
  .refresh-btn:hover { background: #2e2e3e; color: #ccc; }
</style>
</head>
<body>
<h1>Strata Control</h1>
<p class="subtitle">Strata Software Group — Infrastructure Overview</p>
<div id="app"><div class="loading">Loading...</div></div>
<button class="refresh-btn" onclick="load()">Refresh</button>
<script>
async function load() {
  try {
    const r = await fetch('/api/status');
    const d = await r.json();
    render(d);
  } catch(e) {
    document.getElementById('app').innerHTML = '<div class="loading">Failed to connect</div>';
  }
}

function render(d) {
  const app = document.getElementById('app');
  const machinesHtml = d.machines.map(m => `
    <div class="card">
      <div class="card-title">Machine</div>
      <div class="machine">
        <div>
          <div class="machine-name">${m.name}</div>
          <div class="machine-host">${m.hostname} — ${m.ip}</div>
        </div>
        <span class="badge ${m.online ? 'badge-green' : 'badge-red'}">${m.online ? 'Online' : 'Offline'}</span>
      </div>
      ${m.online ? `<div class="stat-row">
        <div class="stat"><span class="stat-label">CPU</span><span class="stat-value">${m.cpu_usage || '—'}</span></div>
        <div class="stat"><span class="stat-label">Memory</span><span class="stat-value">${m.memory_used} / ${m.memory_total}</span></div>
        <div class="stat"><span class="stat-label">Disk</span><span class="stat-value">${m.disk_used} / ${m.disk_total} (${m.disk_percent})</span></div>
        <div class="stat"><span class="stat-label">Uptime</span><span class="stat-value">${m.uptime}</span></div>
      </div>` : ''}
    </div>
  `).join('');

  const servicesHtml = d.services.map(s => {
    const isUp = s.status.includes('Up') || s.status === 'active';
    return `<div class="service-row">
      <div><span class="service-name">${s.name}</span> <span class="service-machine">${s.machine}</span></div>
      <span class="badge ${isUp ? 'badge-green' : 'badge-red'}">${s.status}</span>
    </div>`;
  }).join('');

  const syncHtml = d.sync_folders.map(f => {
    const pct = f.global_files > 0 ? ((f.global_files - f.need_files) / f.global_files * 100) : 0;
    return `<div class="sync-row">
      <div>
        <div class="service-name">${f.label}</div>
        <div class="service-machine">${f.global_files.toLocaleString()} files</div>
      </div>
      <div style="display:flex;align-items:center;gap:10px">
        <div class="sync-bar"><div class="sync-fill" style="width:${pct}%"></div></div>
        <span class="badge ${f.in_sync ? 'badge-green' : 'badge-yellow'}">${f.in_sync ? 'Synced' : Math.round(pct) + '%'}</span>
      </div>
    </div>`;
  }).join('');

  app.innerHTML = `
    <div class="grid">${machinesHtml}</div>
    <div class="grid">
      <div class="card">
        <div class="card-title">Services</div>
        ${servicesHtml}
      </div>
      <div class="card">
        <div class="card-title">VPN — Double NAT</div>
        <div class="vpn-info">
          <div class="vpn-item"><span class="vpn-label">Status</span><span class="badge ${d.vpn.active ? 'badge-green' : 'badge-red'}">${d.vpn.active ? 'Active' : 'Down'}</span></div>
          <div class="vpn-item"><span class="vpn-label">Exit IP</span><span class="vpn-value">${d.vpn.exit_ip || '—'}</span></div>
          <div class="vpn-item"><span class="vpn-label">Interfaces</span><span class="vpn-value">${d.vpn.interfaces.join(', ') || '—'}</span></div>
        </div>
      </div>
    </div>
    <div class="grid">
      <div class="card">
        <div class="card-title">Sync Status</div>
        ${syncHtml}
      </div>
    </div>
    <div class="timestamp">Last updated: ${d.timestamp}</div>
  `;
}

load();
setInterval(load, 30000);
</script>
</body>
</html>
